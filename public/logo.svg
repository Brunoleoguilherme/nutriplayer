<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" fill="none">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A1E"/>
      <stop offset="55%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#16E28A"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A1E"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0BCF74"/>
      <stop offset="100%" stop-color="#16E28A"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="75" cy="75" r="68"/>
    </clipPath>
  </defs>

  <!-- Badge circular background subtle -->
  <circle cx="75" cy="75" r="68" fill="#FFF8F1" stroke="#F0EBE3" stroke-width="1"/>

  <!-- Arc superior laranja -->
  <path d="M 20 42 A 60 60 0 0 1 130 42" stroke="url(#arcGrad)" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Swoosh verde inferior -->
  <path d="M 18 108 Q 75 128 132 108" stroke="url(#swooshGrad)" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Letra N grande laranja-verde -->
  <text x="75" y="100" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="url(#badgeGrad)" opacity="0.92">N</text>

  <!-- Silhueta do atleta correndo (simplificada) -->
  <!-- Cabeça -->
  <circle cx="96" cy="38" r="7" fill="#1E3A5F"/>
  <!-- Corpo inclinado para frente -->
  <line x1="96" y1="45" x2="88" y2="72" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round"/>
  <!-- Braço esquerdo levantado -->
  <line x1="93" y1="55" x2="104" y2="44" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round"/>
  <!-- Braço direito para trás -->
  <line x1="92" y1="57" x2="78" y2="62" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round"/>
  <!-- Perna esquerda à frente -->
  <line x1="88" y1="72" x2="100" y2="92" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round"/>
  <!-- Perna direita atrás -->
  <line x1="88" y1="72" x2="74" y2="88" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round"/>
  <!-- Pé esquerdo -->
  <line x1="100" y1="92" x2="112" y2="96" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round"/>
  <!-- Pé direito levantado -->
  <line x1="74" y1="88" x2="68" y2="80" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round"/>

  <!-- Traços de velocidade -->
  <line x1="28" y1="70" x2="45" y2="70" stroke="#FF8A1E" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="80" x2="44" y2="80" stroke="#FF8A1E" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="90" x2="46" y2="90" stroke="#FF8A1E" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- WORDMARK: NUTRI -->
  <text x="158" y="82" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="48" fill="#1E3A5F" letter-spacing="-1">NUTRI</text>
  <!-- WORDMARK: PLAYER -->
  <text x="158" y="130" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="48" fill="#16A34A" letter-spacing="-1">PLAYER</text>

  <!-- Tagline -->
  <line x1="158" y1="142" x2="178" y2="142" stroke="#FF8A1E" stroke-width="1.5"/>
  <text x="240" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="2" font-weight="600">SPORTS NUTRITION INTELLIGENCE</text>
  <line x1="302" y1="142" x2="322" y2="142" stroke="#16E28A" stroke-width="1.5"/>
</svg>
